function playFx(){
  const grid=document.getElementById('grid');
  if(!grid){fx=[];return;}
  const px=(x,y)=>({left:x*TSCUR+4,top:y*TSCUR+4});
  for(const e of fx){
    if(e.type==='flash'||e.type==='dodge'){
      const el=grid.querySelector(`[data-uid="${e.uid}"]`);
      if(el){el.classList.add(e.type==='flash'?'hitflash':'dodge'); setTimeout(()=>el.classList.remove('hitflash','dodge'),500);}
    } else if(e.type==='float'){
      const p=px(e.x,e.y); const el=document.createElement('div');
      el.className='fxfloat'; el.textContent=e.txt; el.style.left=(p.left+10)+'px'; el.style.top=p.top+'px'; el.style.color=e.color||'#d8cdb8';
      grid.appendChild(el); setTimeout(()=>el.remove(),850);
    } else if(e.type==='arrow'){
      const a=px(e.fx,e.fy), b=px(e.tx,e.ty);
      const el=document.createElement('div'); el.className='fxarrow';
      const ang=Math.atan2(b.top-a.top,b.left-a.left)*180/Math.PI;
      el.style.transform='rotate('+ang+'deg)';
      el.style.left=(a.left+14)+'px'; el.style.top=(a.top+20)+'px';
      grid.appendChild(el);
      requestAnimationFrame(()=>{ el.style.left=(b.left+14)+'px'; el.style.top=(b.top+20)+'px'; });
      setTimeout(()=>el.remove(),280);
    }
    else if(e.type==='bolt'){ fxBolt(e.fx,e.fy,e.tx,e.ty,e.color,e.color2,e.dur); }
    else if(e.type==='burst'){ fxBurst(e.x,e.y,e.color); }
    else if(e.type==='nova'){ fxNova(e.x,e.y,e.color,e.r); }
    else if(e.type==='spikes'){ fxSpikes(e.x,e.y,e.color); }
    else if(e.type==='ward'){ fxWard(e.x,e.y,e.color); }
    else if(e.type==='heal'){ fxHeal(e.x,e.y,e.color); }
    else if(e.type==='smoke'){ fxSmoke(e.x,e.y); }
  }
  fx=[];
}

  return `<div id="header"><h1><svg width="17" height="22" viewBox="0 0 20 26" style="vertical-align:-4px;margin-right:2px"><rect x="1" y="0" width="2.2" height="26" fill="#6b5636"/><path d="M4 2 h14 v15 l-7 -4.5 l-7 4.5 Z" fill="#7a2f24" stroke="#c9a227" stroke-width="1.2"/><circle cx="11" cy="7.5" r="2.2" fill="#c9a227"/></svg>GRAVEBORNE</h1><span class="hint">alpha v0.63</span>
    <span class="stat">Week <b>${S.week}</b>, day <b>${(S.day%7)+1}</b></span>

    <span class="stat">Coin <b>${S.coin}</b></span>

    <span style="flex:1"></span><button onclick="NEWGAME()">New Company</button></div>`;

function hexPts(cx,cy,s){let p=[];for(let i=0;i<6;i++){const a=Math.PI/180*(60*i);p.push((cx+s*Math.cos(a)).toFixed(1)+','+(cy+s*Math.sin(a)).toFixed(1));}return p.join(' ');}
// hex geometry is fixed for the life of the sheet — compute the outlines once, reuse every render
const HEXGEO={pts:null,d:null};
function hexGeo(){
  if(HEXGEO.pts)return HEXGEO;
  HEXGEO.pts={}; HEXGEO.d={};
  for(let q=0;q<COLS;q++)for(let r=0;r<ROWS;r++){
    const c=hexCenter(q,r), k=q+','+r;
    HEXGEO.pts[k]=hexPts(c.x,c.y,HXS-0.8);
    HEXGEO.d[k]='M'+HEXGEO.pts[k].replace(/ /g,'L')+'Z';
  }
  return HEXGEO;
}
function hexCenter(q,r){const s=HXS;return{x:s*1.5*q+s+2,y:s*Math.sqrt(3)*(r+0.5*(q%2))+s+2};}
function hexTitle(h){
  const reg=S.regions[h.region];
  if(!reg)return hexDesc(h);
  let t=hexDesc(h)+' — '+(reg.swallowed?'SWALLOWED':'pressure '+reg.pressure);
  if(h.road)t+=' · road';
  if(h.blighted)t+=' · blighted';
  const c=S.contracts.find(c=>c.q===h.q&&c.r===h.r);
  if(c)t+=' · CONTRACT: '+CONTRACT_TYPES[c.type].n+' ('+c.pay+'c)';
  for(const a of S.agents.filter(a=>a.q===h.q&&a.r===h.r)){
    t+=' · '+(a.kind==='army'?'Karsk column':a.kind==='horde'?'Blight horde':a.kind==='revenant'?'YOUR DEAD WALKS HERE':'brigands');
  }
  return t;
}
function hexArt(h,x,y){
  const P='pointer-events="none"';
  let a='';
  if(h.setl!==null){
    a+=`<g ${P}><rect x="${x-8}" y="${y-2}" width="8" height="7" fill="#5a4a35" stroke="#17130e"/><path d="M${x-9} ${y-2} L${x-4} ${y-8} L${x+1} ${y-2} Z" fill="#7a5a3a" stroke="#17130e"/>
      <rect x="${x+1}" y="${y}" width="7" height="5" fill="#4c3f2d" stroke="#17130e"/><path d="M${x} ${y} L${x+4.5} ${y-5} L${x+9} ${y} Z" fill="#6b4f33" stroke="#17130e"/></g>`;
  } else if(h.t==='mountain'){
    a+=`<g ${P}><path d="M${x-10} ${y+7} L${x-2} ${y-8} L${x+4} ${y+7} Z" fill="#524b3f" stroke="#17130e" stroke-width="1.2"/>
      <path d="M${x-4.5} ${y-3.5} L${x-2} ${y-8} L${x+0.5} ${y-3.5} Z" fill="#8a8578"/>
      <path d="M${x+1} ${y+7} L${x+7} ${y-3} L${x+12} ${y+7} Z" fill="#453f35" stroke="#17130e"/></g>`;
  } else if(h.t==='forest'){
    a+=`<g ${P}><path d="M${x-7} ${y+6} L${x-3.5} ${y-5} L${x} ${y+6} Z" fill="#31402a" stroke="#141a10"/>
      <path d="M${x+1} ${y+8} L${x+5} ${y-2} L${x+9} ${y+8} Z" fill="#2a3823" stroke="#141a10"/></g>`;
  } else if(h.t==='hills'){
    a+=`<g ${P} stroke="#4c4436" stroke-width="1.6" fill="none"><path d="M${x-9} ${y+4} q4.5 -7 9 0"/><path d="M${x+1} ${y+7} q4 -6 8 0"/></g>`;
  } else if(h.t==='marsh'){
    a+=`<g ${P} stroke="#4a5a4e" stroke-width="1.3"><path d="M${x-5} ${y+5} v-8 M${x-2} ${y+6} v-10 M${x+1} ${y+5} v-7"/><path d="M${x-8} ${y+7} h6 M${x+4} ${y+6} h6" stroke="#3d4a42"/></g>`;
  }
  if(h.feat==='ruin')a+=`<g ${P}><rect x="${x-6}" y="${y-4}" width="3.5" height="10" fill="#5c5548" stroke="#17130e" transform="rotate(-7 ${x-4} ${y})"/><rect x="${x+2}" y="${y-1}" width="3.5" height="7" fill="#524b3f" stroke="#17130e" transform="rotate(9 ${x+4} ${y+2})"/></g>`;
  if(h.feat==='shrine')a+=`<g ${P} stroke="#8a8578" stroke-width="1.8"><path d="M${x} ${y+6} v-11 M${x-4} ${y-1.5} h8"/></g>`;
  if(h.feat==='barrow')a+=`<g ${P}><path d="M${x-8} ${y+5} q8 -12 16 0 Z" fill="#4a4234" stroke="#17130e"/><circle cx="${x}" cy="${y+3}" r="1.8" fill="#17130e"/></g>`;
  if(h.feat==='battlefield')a+=`<g ${P} stroke="#6b6353" stroke-width="1.6"><path d="M${x-6} ${y+5} L${x+5} ${y-6} M${x+5} ${y+5} L${x-6} ${y-6}"/></g>`;
  if(h.feat==='watchtower')a+=`<g ${P}><rect x="${x-3}" y="${y-8}" width="6" height="14" fill="#524b3f" stroke="#17130e"/><path d="M${x-4.5} ${y-8} h2.5 v-2.5 h1.8 v2.5 h2.5 v-2.5 h1.8 v2.5 h2.4" stroke="#17130e" fill="none"/></g>`;
  if(h.blighted)a+=`<g ${P} opacity=".75"><path d="M${x-8} ${y+8} q4 -10 2 -16 M${x+7} ${y+9} q-5 -8 -1 -15" stroke="#7a4fa3" stroke-width="1.4" fill="none"/><circle cx="${x+4}" cy="${y-6}" r="1.5" fill="#9a6fc9"/></g>`;
  return a;
}
function hexSvg(){
  const TC={plains:'#2e2a20',forest:'#26301f',hills:'#37322a',marsh:'#28302c',mountain:'#453f35'};
  // fogged provinces are drawn, but drained of colour — you can see the SHAPE of the world you haven't walked
  const FOG={plains:'#262218',forest:'#232b1d',hills:'#2c2822',marsh:'#232926',mountain:'#332f28'};
  const G=hexGeo();
  let out='<defs><radialGradient id="vig" cx="50%" cy="42%" r="78%"><stop offset="60%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,.45)"/></radialGradient></defs>',glyphs='';
  const CP=caravanProv();
  const focus=h=>h.prov===CP||(h.choke&&hexNbrs(h.q,h.r).some(n=>n.prov===CP));
  // ---- batched tier: every province you are NOT standing in, as one path per terrain bucket ----
  const buckets={};
  for(const k in S.hexes){
    const h=S.hexes[k];
    if(h.prov<0||focus(h))continue;
    const known=provKnown(h.prov);
    const fill=h.blighted?(known?'#2c2138':'#231b2c'):(known?TC[h.t]:FOG[h.t]);
    (buckets[fill]=buckets[fill]||[]).push(G.d[k]);
  }
  for(const fill in buckets)
    out+=`<path d="${buckets[fill].join('')}" fill="${fill}" stroke="#191612" stroke-width="0.6" pointer-events="none"/>`;
  // province names + settlement dots carry the far world without per-hex cost
  for(const P of PROV_DEFS){
    if(P.id===CP)continue;
    const t=provTier(P.id), a0=hexCenter(P.q0,P.r0), b0=hexCenter(P.q0+PW-1,P.r0+PH-1);
    const cx=(a0.x+b0.x)/2, cy=(a0.y+b0.y)/2;
    const col=t>=2?'#c9b48a':t===1?'#9d907a':'#6b6353';
    const fs=S.mapWide?34:16;                      // the label must read at realm zoom, not just up close
    out+=`<text x="${cx.toFixed(0)}" y="${cy.toFixed(0)}" text-anchor="middle" pointer-events="none" `
       +`style="fill:${col};font-size:${fs}px;letter-spacing:${S.mapWide?6:2}px;font-weight:bold;`
       +`opacity:${t>=2?0.8:t===1?0.62:0.42}">`
       +`${esc(t===0?'? ? ?':P.n.toUpperCase())}</text>`;
    if(S.mapWide&&t>0)out+=`<text x="${cx.toFixed(0)}" y="${(cy+26).toFixed(0)}" text-anchor="middle" pointer-events="none" `
       +`style="fill:${col};font-size:15px;opacity:.55">${esc(P.blurb.split('.')[0])}</text>`;
  }
  for(const k in S.hexes){ const h=S.hexes[k];
    if(h.prov<0||focus(h)||h.setl===null)continue;
    const c=hexCenter(h.q,h.r), known=provKnown(h.prov);
    out+=`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${S.mapWide?4.5:2.6}" fill="${known?'#c9b48a':'#6b6353'}" pointer-events="none"/>`;
    if(known)out+=`<text x="${c.x.toFixed(1)}" y="${(c.y+HXS-3).toFixed(1)}" class="hx" style="fill:#8a7f6a;font-size:7px">${esc(REGION_DEFS[h.setl].s)}</text>`;
  }
  if(S.mapWide){ const FB=provOf(CP), fa=hexCenter(FB.q0,FB.r0), fb=hexCenter(FB.q0+PW-1,FB.r0+PH-1);
    out+=`<rect x="${(fa.x-HXS).toFixed(0)}" y="${(fa.y-HXS).toFixed(0)}" width="${(fb.x-fa.x+HXS*2).toFixed(0)}" `
       +`height="${(fb.y-fa.y+HXS*2).toFixed(0)}" fill="none" stroke="#c9a227" stroke-width="2.5" `
       +`stroke-dasharray="10 7" opacity=".55" pointer-events="none"/>`; }
  // ---- focus tier: the province you are standing in, at full fidelity ----
  for(const k in S.hexes){
    const h=S.hexes[k]; if(!focus(h))continue;
    const{x,y}=hexCenter(h.q,h.r);
    let fill=h.blighted?'#2c2138':TC[h.t];
    if(h.setl!==null&&!h.blighted)fill='#3d352a';
    if(h.prov!==CP)fill='#1a1712';                      // the far side of a crossing: seen, not entered
    const seld=sel===k;
    out+=`<g onclick="HEX(${h.q},${h.r})" style="cursor:pointer"><title>${esc(hexTitle(h))}</title>
      <polygon points="${G.pts[k]}" fill="${fill}" stroke="${seld?'#c9a227':'#191612'}" stroke-width="${seld?2.2:1}"/></g>`;
    glyphs+=hexArt(h,x,y);
    if(h.setl!==null)glyphs+=`<text x="${x}" y="${y+HXS-3}" class="hx" style="fill:#c9b48a;font-size:8.5px">${esc(REGION_DEFS[h.setl].s)}</text>`;
  }
  // roads drawn as visible tracks between adjacent road hexes
  const segs=new Set();
  for(const k in S.hexes){
    const h=S.hexes[k]; if(!h.road||!focus(h))continue;
    for(const nb of hexNbrs(h.q,h.r)){
      if(!nb.road||!focus(nb))continue;
      const key=[k,hexKey(nb.q,nb.r)].sort().join('|');
      if(segs.has(key))continue; segs.add(key);
      const a=hexCenter(h.q,h.r),b2=hexCenter(nb.q,nb.r);
      out+=`<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b2.x.toFixed(1)}" y2="${b2.y.toFixed(1)}" stroke="#141109" stroke-width="6" stroke-linecap="round" pointer-events="none" opacity=".55"/>
            <line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b2.x.toFixed(1)}" y2="${b2.y.toFixed(1)}" stroke="#8a6f45" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="7 4" pointer-events="none" opacity=".9"/>`;
    }
  }
  // chokepoint pips — the only ways out of a province, and each one wants something
  for(const k in S.hexes){ const h=S.hexes[k]; if(!h.choke||!focus(h)||h.prov!==CP)continue;
    const{x,y}=hexCenter(h.q,h.r);
    out+=`<g pointer-events="none"><circle cx="${x}" cy="${y-HXS*0.55}" r="7" fill="#17130e" stroke="#c9a227" stroke-width="1.6"/>`
        +`<text x="${x}" y="${y-HXS*0.55+3.5}" style="font-size:9px;fill:#c9a227;text-anchor:middle;font-weight:bold">⇄</text></g>`; }
  out+=glyphs;
  for(const c of S.contracts){const{x,y}=hexCenter(c.q,c.r);
    out+=`<g onclick="HEX(${c.q},${c.r})" style="cursor:pointer"><circle cx="${x+HXS*0.5}" cy="${y-HXS*0.5}" r="${c.story?7:6}" fill="${c.story?'#b08bc9':'#c9a227'}" ${c.story?'stroke="#e8d9f5" stroke-width="1.2"':''}/><text x="${x+HXS*0.5}" y="${y-HXS*0.5+3.5}" class="hxC">!</text></g>`;}
  for(const d of (S.deserters||[])){const c0=hexCenter(realmQ(d.town),realmR(d.town));
    out+=`<g pointer-events="none"><circle cx="${(c0.x-HXS*0.5).toFixed(1)}" cy="${(c0.y-HXS*0.5).toFixed(1)}" r="6" fill="#17130e" stroke="#7d93a3" stroke-width="1.6"/><text x="${(c0.x-HXS*0.5).toFixed(1)}" y="${(c0.y-HXS*0.5+3).toFixed(1)}" style="font-size:9px;fill:#a8b7c4;text-anchor:middle;font-weight:bold">⚐</text></g>`;}
  const byHex={};
  for(const a of S.agents){ (byHex[a.q+','+a.r]=byHex[a.q+','+a.r]||[]).push(a); }
  for(const k2 in byHex) byHex[k2].forEach((a,idx)=>{
    const c0=hexCenter(a.q,a.r);
    const ox=c0.x+(idx?9*idx-4:0), oy=c0.y-(idx?6:0);
    const col=a.kind==='army'?'#7d93a3':a.kind==='revenant'?'#c9a9e0':a.kind==='horde'?'#9a6fc9':a.kind==='hunters'?'#8a6f9f':'#e0593f';
    const g=a.kind==='army'?'♞':a.kind==='horde'?'☠':a.kind==='revenant'?'⚰':a.kind==='hunters'?'⚚':'⚑';
    out+=`<g pointer-events="none">
      ${a.kind==='revenant'?`<circle cx="${ox}" cy="${oy}" r="11" fill="none" stroke="#b08bc9" stroke-width="1.3" opacity=".6"/>`:''}
      <circle cx="${ox}" cy="${oy}" r="8.5" fill="#17130e" stroke="${col}" stroke-width="1.8"/>
      <text x="${ox}" y="${oy+4}" style="font-size:11.5px;fill:${col};text-anchor:middle;font-weight:bold">${g}</text></g>`;
  });
  if(S.story&&S.story.stage===5&&S.story.meetHex&&S.week<=S.story.meetWeek){
    const{x,y}=hexCenter(S.story.meetHex.q,S.story.meetHex.r);
    out+=`<g pointer-events="none"><circle cx="${x}" cy="${y}" r="12" fill="none" stroke="#b08bc9" stroke-width="1.6" stroke-dasharray="4 3"><animate attributeName="r" values="10;13;10" dur="2.4s" repeatCount="indefinite"/></circle>
      <text x="${x}" y="${y-14}" style="font-size:9px;fill:#c9a9e0;text-anchor:middle">wk ${S.story.meetWeek}</text></g>`;
  }
  {const{x,y}=hexCenter(S.caravan.q,S.caravan.r);
    out+=`<g pointer-events="none"><circle cx="${x}" cy="${y}" r="10" fill="#17130e" stroke="#c9a227" stroke-width="2"/>
      <text x="${x}" y="${y+5}" style="font-size:13px;text-anchor:middle">⛺</text></g>`;}
  if(sel){const [q,r]=sel.split(',').map(Number);const p=hexPath(S.caravan,{q,r});
    if(p&&p.length>1){let d='';p.forEach((st,i)=>{const c=hexCenter(st.q,st.r);d+=(i?'L':'M')+c.x.toFixed(1)+' '+c.y.toFixed(1)+' ';});
      out+=`<path d="${d}" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-dasharray="4 3" pointer-events="none"/>`;}}
  // Act I frames ONE province, inflated so the neighbours' coastlines bleed off every edge and cannot
  // be followed. The reveal does not draw more world — it stops cropping the world already drawn.
  let vx,vy,W,Hh;
  if(S.mapWide){
    const c1=hexCenter(COLS-1,ROWS-1);
    vx=0; vy=0; W=(c1.x+HXS*2).toFixed(0); Hh=(c1.y+HXS*2).toFixed(0);
  } else {
    const PB=provOf(CP), pa=hexCenter(PB.q0,PB.r0), pb2=hexCenter(PB.q0+PW-1,PB.r0+PH-1);
    const bw=pb2.x-pa.x, bh=pb2.y-pa.y, pad=0.35;
    vx=(pa.x-bw*pad/2-HXS).toFixed(0); vy=(pa.y-bh*pad/2-HXS).toFixed(0);
    W=(bw*(1+pad)+HXS*2).toFixed(0); Hh=(bh*(1+pad)+HXS*2).toFixed(0);
  }
  return `<svg viewBox="${vx} ${vy} ${W} ${Hh}" style="width:100%;background:#131009;border:1px solid var(--line);border-radius:4px;box-shadow:inset 0 0 30px rgba(0,0,0,.5)">${out}<rect width="100%" height="100%" fill="url(#vig)" pointer-events="none"/></svg>`;
}
window.NEWGAME=function(){ if(confirm('Raise a new banner? The current company is abandoned to the record.')) newGame(); };

    <div class="face">${faceSvg(s.face,{size:46})}</div>
    <div class="sbody">
      <span class="nm">${esc(s.name)}</span>${s.commander?' <span class="cmdr">Commander</span>':''} <span class="tag tt" data-tip="${esc((CLASSES[s.cls]||CLASSES.fighter).d)}">${esc((CLASSES[s.cls]||CLASSES.fighter).n)}</span> <span class="tag">${esc(bg.tag)}</span> <span class="tag">Lv ${s.level}${s.level>=6?' · '+NAME_LEVELS[s.level].n:''}</span>
      ${oathChip(s)}${isStationed(s)?`<span class="tag tt" style="border-color:#7d93a3;color:#a8b7c4" data-tip="Holding ground. She sends true word from ${esc(provOf(s.stationedProv).n)} and cannot be mustered.">⚑ Holding ${esc(provOf(s.stationedProv).n)}</span>`:''}

      <div class="bg">${esc(bg.line)}</div>

      <div class="wline">${WPN_ICON[s.weapon]||'⚔'} <span class="tt" data-tip="${esc(wpnTip(s.weapon,s.wMod))}">${esc(s.wName||WEAPONS[s.weapon].n)}${s.wMod?' +'+s.wMod:''}</span> · 🛡 <span class="tt" data-tip="${esc(armorTip(s.armor))}">${ARMORS[s.armor].n}</span></div>
      <div class="statline"><span class="tt" data-tip="${esc(STAT_TIPS.hp)}">HP ${s.hp}/${s.maxhp}</span> · <span class="tt" data-tip="${esc(STAT_TIPS.skl)}">SKL ${s.skl}</span> · <span class="tt" data-tip="${esc(STAT_TIPS.spd)}">SPD ${s.spd}</span> · <span class="tt" data-tip="${esc(STAT_TIPS.res)}">RES ${s.res}</span></div>

      ${s.traits&&s.traits.length?`<div class="featline traitchip">${s.traits.map(t=>`<span class="tt" data-tip="${esc(TRAITS[t].d)}">${TRAITS[t].n}</span>`).join(' · ')}</div>`:''}
      ${s.corr?`<div class="featline corrchip"><span class="tt" data-tip="Corruption: the graft feeds on use. At 4 and 7 it takes something back — and her revenant will be stronger for it.">Corruption ${s.corr}</span></div>`:''}
      ${deedChips(s)}
      ${retinueLine(s)}
      ${inHire?`<button ${S.coin<hireCost(s)?'disabled':''} onclick="HIRE(${idx})">Hire — ${hireCost(s)}c</button>`
              :`${nameButtons(s)}${stationButton(s)}${nextArm?((S.unlocks&&S.unlocks.armor)?`<button ${S.coin<armorCost(s.armor+1)?'disabled':''} onclick="BUYARM(${s.id})">Fit ${nextArm.n} (${armorCost(s.armor+1)}c)</button>`:`<span class="hint tt" data-tip="Locked. Recover the Armorsmith's Tools on a Quartermaster commission to fit heavier armor.">🔒 Armorsmith's Tools</span>`):''}${(WEAPONS[s.weapon]&&WEAPONS[s.weapon].up&&atSettlement()!==null)?((S.unlocks&&S.unlocks.reforge)?`<button ${S.coin<reforgeCost()?'disabled':''} onclick="REFORGE(${s.id})" title="Reforge to a finer weapon at the smithy">Reforge → ${WEAPONS[WEAPONS[s.weapon].up].n} (${reforgeCost()}c)</button>`:`<span class="hint tt" data-tip="Locked. Recover the Blacksmith's Anvil on a Quartermaster commission to reforge weapons.">🔒 Blacksmith's Anvil</span>`):''}`}
    </div>

function reforgeCost(){ return (S.story&&S.story.heir==='aldric')?36:45; }
/* ---- v0.60 card surfaces: deeds are biography, so they live on the card ---- */
function deedChips(s){
  const ds=deedsOf(s);
  if(!ds.length){
    if(s.level!==5)return '';
    const n=ds.length;
    return `<div class="featline"><span class="hint tt" data-tip="There is nothing left to teach her past five. What counts now is what gets told at other fires. Three tellings — one of them hers alone — and a town to hear them.">⚑ Deeds ${n}/${DEED_L6} — the Banner</span></div>`;

    if(pinch&&pts.size>=2){ const v=[...pts.values()]; zoomAt(B,vp,pinch.mx,pinch.my,clampZoom(pinch.z*D(v[0],v[1])/pinch.d)); applyCam(B,pz,vp); moved=true; B._camTouched=true; return; }
    if(start){ const dx=e.clientX-start.x, dy=e.clientY-start.y; if(Math.abs(dx)+Math.abs(dy)>5){moved=true;B._camTouched=true;} B._cam.x=start.cx+dx; B._cam.y=start.cy+dy; applyCam(B,pz,vp); } });
  const up=e=>{ pts.delete(e.pointerId); if(pts.size<2)pinch=null; if(pts.size===0){ start=null; const vp=vpEl(); vp&&vp.classList.remove('grabbing'); } };
  document.addEventListener('pointerup',up); document.addEventListener('pointercancel',up);
  document.addEventListener('wheel',e=>{ const B=S.battle; if(!B||!B._cam||!inVp(e))return; e.preventDefault(); const vp=vpEl(),pz=pzEl(); zoomAt(B,vp,e.clientX,e.clientY,clampZoom(B._cam.z*(e.deltaY<0?1.13:0.88))); applyCam(B,pz,vp); B._camTouched=true; },{passive:false});
  document.addEventListener('click',e=>{ if(moved&&inVp(e)){ e.stopPropagation(); e.preventDefault(); moved=false; } },true); // swallow the click that ends a drag
  // re-fit when the window resizes or the tab becomes visible again (layout was 0 while hidden)
  const refit=()=>{ if(S.battle)render(); };
  window.addEventListener('resize',refit);
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden)refit(); });
  // Mobile portrait sometimes reports a not-yet-settled viewport (URL bar, safe-area) on the FIRST paint, so the map
  // fits to the wrong size and only corrects after an orientation flip. A ResizeObserver on #app fires the moment the
  // real size is known (and on every later change), and visualViewport catches the URL-bar show/hide that window
  // 'resize' can miss. Both just re-fit (guarded by _camTouched, so the player's own pan/zoom is never overridden).
  if(window.visualViewport){ try{ visualViewport.addEventListener('resize',refit); }catch(e){} }
  if(window.ResizeObserver){ try{
    let lw=0,lh=0; const ro=new ResizeObserver(es=>{ const r=es[0].contentRect; if(Math.abs(r.width-lw)>2||Math.abs(r.height-lh)>2){ lw=r.width; lh=r.height; refit(); } });
    const ap=document.getElementById('app'); if(ap)ro.observe(ap);
  }catch(e){} }
}
window.ZOOM=function(dir){ const B=S.battle; if(!B||!B._cam)return; const vp=document.getElementById('viewport'), pz=document.getElementById('panzoom'); if(!vp||!pz)return;
  const r=vp.getBoundingClientRect(), ins=B._ins||{top:0,bot:0}, cyBand=(ins.top+(vp.clientHeight-ins.bot))/2;   // zoom about the CLEAR band's centre, not the raw viewport centre — otherwise zooming shoves the map top up under the HUD
  zoomAt(B,vp,r.left+vp.clientWidth/2,r.top+cyBand,clampZoom(B._cam.z*(dir>0?1.25:0.8))); applyCam(B,pz,vp); B._camTouched=true; };
window.LOGTOGGLE=function(){ const B=S.battle; if(!B)return; B._logOpen=!B._logOpen; render(); };
window.NEXTUNIT=function(){ const B=S.battle; if(!B||B.phase!=='player')return;                 // jump to the next soldier who can still act
  const order=B.units.filter(z=>z.kind==='pc'&&z.hp>0&&!z.fled); if(!order.length)return;
  const ci=order.findIndex(z=>z.uid===B.sel);
  for(let i=1;i<=order.length;i++){ const z=order[(ci+i+order.length)%order.length]; if(pcTurnLeft(z)){ selectUnit(z.uid); return; } } };
window.TILE=function(x,y){
  const B=S.battle; if(!B||B.over||activeModal)return;
  if(B.peek){ B.peekTile={x,y}; render(); return; }   // inspect mode: read the square, take no action (any phase)
  if(B.phase!=='player')return;                        // enemy phase — no player input
  const t=unitAt(B,x,y);
  // tap one of your own soldiers (when not aiming an ability at an ally) → make them the active unit
  if(t&&t.kind==='pc'&&!B.aim){ selectUnit(t.uid); return; }
  const u=activeUnit(B); if(!u){ if(t&&t.kind==='pc')selectUnit(t.uid); return; }
  // ability targeting mode
  if(B.aim&&!u.acted){
    const ab=abilityByKey(u,B.aim);
    if(ab&&t&&abilityValidTarget(B,u,ab,t)){ execAbility(B,u,ab,t); afterAbility(B,u); return; }
    if(t&&t===u){ return; }
  }
  if(t&&isEnemy(u,t)){
    if(t.kind==='foe'&&B._vis&&!B._vis.has(t.x+','+t.y))return; // unseen — hidden by fog of war
    if(!u.acted&&!B.aim&&attackTargets(B,u).includes(t)){ tryAttack(t.uid); return; }
    B.inspect=(B.inspect===t.uid)?null:t.uid; render(); return;  // scout its range instead
  }
  B.inspect=null;
  tryMove(x,y);
};
window.DEFEND=defend; window.ENDT=endPlayerPhase; window.RETREAT=retreat; window.MEDIC=useAbility; window.PEEK=peekToggle;
window.ACTMENU=function(cancel){ const B=S.battle; if(!B||B.phase!=='player')return; if(cancel){ B.aim=null; B._actMenu=false; } else B._actMenu=!B._actMenu; render(); };
window.ACTPICK=function(k){ const B=S.battle; if(!B)return; B._actMenu=false; if(k==='__brace')defend(); else useAbility(k); };   // pick from the Actions dropdown
function renderGameOver(){
  if(S.victory)return renderVictory();
  const walking=S.graves.filter(g=>g.state==='risen');
  return header()+`<div id="main"><div class="col" style="flex:1">
    <h1>This is how the company died.</h1>
    <p>Week ${S.week}. Renown ${S.renown}. ${S.graves.length} graves in the ledger.</p>
    <h2>Chronicle</h2>
    ${S.chronicle.map(c=>`<p class="bg">${esc(c)}</p>`).join('')||'<p class="hint">A short story.</p>'}
    ${walking.length?`<h2>Still walking</h2><p class="bond">${walking.map(g=>esc(g.name)).join(', ')} — unresolved, improving, wearing your colors. Someone else’s problem now.</p>`:''}
    <p style="margin-top:14px;font-style:italic">You fought everyone you failed to protect. In the end, that was everyone.</p>
    <button class="primary" onclick="NEWGAME()">Raise a new banner</button>
  </div></div>`;
}
function renderVictory(){
  const h=S.story.heir;
  const heirLine=h==='aldric'?'<b>Prince Aldric</b> takes the throne in armor, and rules the way he fought — a wall against the dark, and little mercy for what the dark has already touched. The March has a soldier-king now. It will need one.'
    :h==='maren'?'<b>Princess Maren</b> takes the throne she was never meant to have, the ledger that damned Vell folded into her first decree. She remembers who came through her window. A mercenary company has a friend in the high seat, for as long as friendship survives a crown.'
    :'<b>Prince Casmir</b> takes the throne, and the Conclave’s brokers are seen at court within the month. The Blight has not stopped — it has been <i>negotiated with</i>. You are paid, and paid well, and you try not to think about the terms.';
  const walking=S.graves.filter(g=>g.state==='risen');
  const rested=S.graves.filter(g=>g.state==='rest').length;
  const grafted=S.roster.filter(s=>(s.feats||[]).some(f=>FEATS[f]&&FEATS[f].ash)).length;
  const corr=S.roster.reduce((a,s)=>a+(s.corr||0),0);
  const identity=grafted>=2||corr>=6?'You did not win this clean. Half your company answers to grafts and whispers now — you fought the Blight with the Blight, and the Cindered Faith has a long memory.'
    :grafted?'A relic-grafted few carried the company past what steel alone could do. You will answer for them, someday.'
    :'You held to steel and coin and the Undercrown’s honest iron. Slower, harder, cleaner — and no one at your fire flinches from the firelight.';
  const reck=walking.length
    ? `${walking.length} of your dead still walk, unresolved, wearing your colors — <b>${walking.map(g=>esc(g.name)).join(', ')}</b>. You put the Magister down, but you never put <i>them</i> down. Some nights, on the road, you still hear your own build coming.`
    : rested?`Every soldier you lost, you laid to rest. Your graveyard is quiet, and it stays quiet. That is the rarest victory this land allows.`
    :'You lost almost no one — or you never let anyone matter enough to lose. History will not know the difference.';
  return header()+`<div id="main"><div class="col" style="flex:1">
    <h1 style="color:#c9a227">The Argument Ends.</h1>
    <p>Week ${S.week}. Renown ${S.renown}. Magister Vell is dead, and the hand that fed the Blight is off the board.</p>
    <h2>The Throne</h2><p>${heirLine}</p>
    <h2>The Company You Became</h2><p>${identity}</p>
    <h2>The Reckoning</h2><p class="bond">${reck}</p>
    <h2>Chronicle</h2>
    ${S.chronicle.slice(-8).map(c=>`<p class="bg">${esc(c)}</p>`).join('')||'<p class="hint">A short, bloody story.</p>'}
    <p style="margin-top:14px;font-style:italic">The Blight is not ended. It never ends. But for one season, on one banner, you fought everyone you failed to protect — and you were still standing when the smoke cleared.</p>
    <p class="hint">— GRAVEBORNE, Act III. Thank you for playing the alpha. —</p>
    <button class="primary" onclick="NEWGAME()">Raise a new banner</button>
  </div></div>`;
}

/* ============================== BOOT ============================== */
window.G={ get state(){return S;}, newGame, advanceDays, weeklyTick, startBattle, save, load,
  soldierById, rise, graves:()=>S.graves, dbgKill:(id)=>{const s=soldierById(id); if(s){S.battle=null; killSoldier(s); S.graves[S.graves.length-1].state='lost'; render();}} };
if(tryResumeBattle()){                       // a fight was interrupted (reload / orientation change) — pick it back up
  log('The fight resumes where it stood.','wk');
  render();
  if(S.battle&&S.battle.phase==='enemy'&&!S.battle.over){ try{ maybeAI(); }catch(e){} }   // re-kick the enemy AI (its timers died with the old page)
  for(const s of S.roster){ (s.pendingFeats||[]).forEach(p=>queueModal(()=>featModal(s,p.opts.filter(f=>!s.feats.includes(f)),p.stat))); }   // a level-up earned mid-fight is still owed — the modalQ died with the old page
  pumpModals();
} else if(!load()){
  // load() swallows exceptions. If a save EXISTS and we got here, something failed mid-migration —
  // never start a fresh company over a live campaign; offer the untouched backup instead.
  if(localStorage.getItem('graveborne_v01')||localStorage.getItem(BACKUP_KEY))recoveryModal();
  else newGame();
}
else {
  log('The record resumes.','wk');
  // self-heal interrupted choices: rites and feat picks owed from before a reload
  for(const g of S.graves){ if(g.state==='recovered') queueModal(()=>ritesModal(g)); }
  for(const s of S.roster){ (s.pendingFeats||[]).forEach(p=>queueModal(()=>featModal(s,p.opts.filter(f=>!s.feats.includes(f)),p.stat))); }
  render(); pumpModals();
}
// persist a live battle when the page is hidden or unloaded (mobile rotate/refresh), so it can be resumed on boot
window.addEventListener('pagehide',stashBattle);
document.addEventListener('visibilitychange',()=>{ if(document.hidden)stashBattle(); });
</script>
</body>
</html>
