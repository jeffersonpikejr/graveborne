function render(){
  const app=document.getElementById('app');
  if(!S){app.innerHTML='';return;}
  let html='';
  if(S.over) html=renderGameOver();
  else if(S.battle) html=renderBattle();
  else if(SNK) html=renderSneak();
  else html=renderCompany();
  if(activeModal){
    html+=`<div id="modalBack"><div id="modal"><h2>${esc(activeModal.title)}</h2>${activeModal.html}
      <div class="btns">${activeModal.btns.map((b,i)=>`<button class="${b.cls||''}" ${b.disabled?'disabled':''} onclick="MODALBTN(${i})">${esc(b.label)}</button>`).join('')}</div></div></div>`;
  }
  // capture the current camera BEFORE innerHTML wipes the scroll container, so we can hold it steady when we shouldn't move
  const _pcam=S.battle?(()=>{const g=document.getElementById('gridwrap');return g?{l:g.scrollLeft,t:g.scrollTop}:null;})():null;
  app.innerHTML=html;
  const lg=document.getElementById('log'); if(lg)lg.scrollTop=0;
  // keep the acting unit in view on scrolling battle maps
  if(S.battle){ const B=S.battle; const gw=document.getElementById('gridwrap'); const cu=curUnit(B);
    // only follow the player's own units, or a foe the player can actually see — never scroll to an enemy hidden by fog
    const canCenter=cu&&(cu.kind!=='foe'||(B._vis&&B._vis.has(cu.x+','+cu.y)));
    if(gw){
      if(cu&&canCenter){ const ts=(B._ts||40)+1; gw.scrollLeft=clamp(cu.x*ts-gw.clientWidth/2,0,1e5); gw.scrollTop=clamp(cu.y*ts-gw.clientHeight/2,0,1e5); }
      else if(_pcam){ gw.scrollLeft=_pcam.l; gw.scrollTop=_pcam.t; } // hold the player's view — don't snap to a corner or reveal an unseen foe
    } }
  playFx();
}
function playFx(){
  const grid=document.getElementById('grid');
  if(!grid){fx=[];return;}
  const px=(x,y)=>({left:x*(TSCUR+1)+4,top:y*(TSCUR+1)+4});
  for(const e of fx){
    if(e.type==='flash'||e.type==='dodge'){
      const el=grid.querySelector(`[data-uid="${e.uid}"]`);
      if(el){el.classList.add(e.type==='flash'?'hitflash':'dodge'); setTimeout(()=>el.classList.remove('hitflash','dodge'),500);}
    } else if(e.type==='float'){
      const p=px(e.x,e.y); const el=document.createElement('div');
      el.className='fxfloat'; el.textContent=e.txt; el.style.left=(p.left+10)+'px'; el.style.top=p.top+'px'; el.style.color=e.color||'#d8cdb8';
      grid.appendChild(el); setTimeout(()=>el.remove(),850);
    } else if(e.type==='arrow'){
      const a=px(e.fx,e.fy), b=px(e.tx,e.ty);
      const el=document.createElement('div'); el.className='fxarrow';
      const ang=Math.atan2(b.top-a.top,b.left-a.left)*180/Math.PI;
      el.style.transform='rotate('+ang+'deg)';
      el.style.left=(a.left+14)+'px'; el.style.top=(a.top+20)+'px';
      grid.appendChild(el);
      requestAnimationFrame(()=>{ el.style.left=(b.left+14)+'px'; el.style.top=(b.top+20)+'px'; });
      setTimeout(()=>el.remove(),280);
    }
  }
  fx=[];
}

// one-time: tap-to-reveal tooltips (touch has no hover) + re-render tactical views on resize
(function(){
  const toast=document.createElement('div'); toast.id='tiptoast'; document.body.appendChild(toast);
  let th;
  document.addEventListener('click',e=>{
    const el=e.target.closest&&e.target.closest('[data-tip]');
    if(!el)return;
    toast.textContent=el.getAttribute('data-tip');
    toast.classList.add('show');
    clearTimeout(th); th=setTimeout(()=>toast.classList.remove('show'),3600);
  },true);
  let rz; window.addEventListener('resize',()=>{ clearTimeout(rz); rz=setTimeout(()=>{ if(S)render(); },150); });
  document.addEventListener('keydown',e=>{
    if(SNK&&SNK.live&&!SNK.over&&!activeModal){
      const kk=e.key.toLowerCase(); let dx=0,dy=0;
      if(kk==='arrowup'||kk==='w')dy=-1; else if(kk==='arrowdown'||kk==='s')dy=1;
      else if(kk==='arrowleft'||kk==='a')dx=-1; else if(kk==='arrowright'||kk==='d')dx=1;
      else if(kk==='escape'){ SNKABORT(); return; }
      if(dx||dy){ e.preventDefault(); SNK.target={x:clamp(SNK.player.x+dx*70,10,SNK.W-10),y:clamp(SNK.player.y+dy*70,10,SNK.H-10)}; }
      return;
    }
    if(activeModal||!S||!S.battle)return;
    const B=S.battle, u=curUnit(B); if(!u||u.kind!=='pc')return;
    const k=e.key.toLowerCase();
    if(k===' '||k==='enter'){ e.preventDefault(); endUnitTurn(); }
    else if(k==='b'){ defend(); }
    else if(k==='f'||k==='q'){ useAbility(); }
    else if(k==='r'){ retreat(); }
    else if(k==='escape'){ if(B.aim){B.aim=null;render();} }
  });
})();

      <span class="stat" style="color:var(--gold)">⚑ <b>${OBJECTIVES[B.obj].n}</b>${objProg}</span>
      ${B.weather?`<span class="tag" style="color:#aab3c0;border-color:#3a4048" title="Ranged attacks capped at range 3; enemies beyond 5 tiles are hidden">${B.weather==='fog'?'FOG':'ASH-HAZE'}</span>`:''}
      ${isPC?`<span class="pips">Move ${u.moved?'—':'●'} · Action ${u.acted?'—':'●'}</span>`:'<span class="hint">enemy turn…</span>'}
      <span class="initstrip" title="Turn order — the active unit is highlighted">${q}</span>
      <span id="actbar">
      ${ab?`<button ${isPC&&!u.acted?'':'disabled'} onclick="MEDIC()" title="${esc(ab.tip)}">${B.aim===ab.k?'Cancel':ab.label}</button>`:''}
      <button ${isPC&&!u.acted?'':'disabled'} onclick="DEFEND()" title="Spend your action: −10 to be hit and +2 armor until your next turn; steadies nerves (−1 rattled)">🛡 Brace</button>
      <button class="primary" ${isPC?'':'disabled'} onclick="ENDT()">End Turn ⏎</button>
      <button class="danger" ${isPC?'':'disabled'} onclick="RETREAT()" title="Forfeit the pay. Fallen comrades are carried out only if a living soldier stands beside their body.">Retreat</button></span></div>
    <div id="battleWrap">${grid}
      <div class="col" id="sidePanel"><h2>Unit</h2>${insp}
        <h2 style="margin-top:8px">Field log</h2><div style="font-size:12px;max-height:180px;overflow-y:auto">${B.log.map(m=>`<p style="margin:2px 0">${m}</p>`).join('')}</div>
      </div></div>`;
}
window.TILE=function(x,y){
  const B=S.battle; if(!B||B.over||activeModal)return;
  const u=curUnit(B); if(!u||u.kind!=='pc')return;
  const t=unitAt(B,x,y);
  // ability targeting mode
  if(B.aim&&!u.acted){
    const ab=unitAbility(u);
    if(ab&&ab.k===B.aim&&t&&abilityValidTarget(B,u,ab,t)){ execAbility(B,u,ab,t); afterAbility(B,u); return; }
    if(t&&t===u){ return; }
  }
  if(t&&isEnemy(u,t)){
    if(t.kind==='foe'&&B._vis&&!B._vis.has(t.x+','+t.y))return; // unseen — hidden by fog of war
    if(!u.acted&&!B.aim&&attackTargets(B,u).includes(t)){ tryAttack(t.uid); return; }
    B.inspect=(B.inspect===t.uid)?null:t.uid; render(); return;  // scout its range instead
  }
  B.inspect=null;
  tryMove(x,y);
};
window.DEFEND=defend; window.ENDT=endUnitTurn; window.RETREAT=retreat; window.MEDIC=useAbility;
function renderGameOver(){
  if(S.victory)return renderVictory();
  const walking=S.graves.filter(g=>g.state==='risen');
  return header()+`<div id="main"><div class="col" style="flex:1">
    <h1>This is how the company died.</h1>
    <p>Week ${S.week}. Renown ${S.renown}. ${S.graves.length} graves in the ledger.</p>
    <h2>Chronicle</h2>
    ${S.chronicle.map(c=>`<p class="bg">${esc(c)}</p>`).join('')||'<p class="hint">A short story.</p>'}
    ${walking.length?`<h2>Still walking</h2><p class="bond">${walking.map(g=>esc(g.name)).join(', ')} — unresolved, improving, wearing your colors. Someone else’s problem now.</p>`:''}
    <p style="margin-top:14px;font-style:italic">You fought everyone you failed to protect. In the end, that was everyone.</p>
    <button class="primary" onclick="NEWGAME()">Raise a new banner</button>
  </div></div>`;
}
function renderVictory(){
  const h=S.story.heir;
  const heirLine=h==='aldric'?'<b>Prince Aldric</b> takes the throne in armor, and rules the way he fought — a wall against the dark, and little mercy for what the dark has already touched. The March has a soldier-king now. It will need one.'
    :h==='maren'?'<b>Princess Maren</b> takes the throne she was never meant to have, the ledger that damned Vell folded into her first decree. She remembers who came through her window. A mercenary company has a friend in the high seat, for as long as friendship survives a crown.'
    :'<b>Prince Casmir</b> takes the throne, and the Conclave’s brokers are seen at court within the month. The Blight has not stopped — it has been <i>negotiated with</i>. You are paid, and paid well, and you try not to think about the terms.';
  const walking=S.graves.filter(g=>g.state==='risen');
  const rested=S.graves.filter(g=>g.state==='rest').length;
  const grafted=S.roster.filter(s=>(s.feats||[]).some(f=>FEATS[f]&&FEATS[f].ash)).length;
  const corr=S.roster.reduce((a,s)=>a+(s.corr||0),0);
  const identity=grafted>=2||corr>=6?'You did not win this clean. Half your company answers to grafts and whispers now — you fought the Blight with the Blight, and the Cindered Faith has a long memory.'
    :grafted?'A relic-grafted few carried the company past what steel alone could do. You will answer for them, someday.'
    :'You held to steel and coin and the Undercrown’s honest iron. Slower, harder, cleaner — and no one at your fire flinches from the firelight.';
  const reck=walking.length
    ? `${walking.length} of your dead still walk, unresolved, wearing your colors — <b>${walking.map(g=>esc(g.name)).join(', ')}</b>. You put the Magister down, but you never put <i>them</i> down. Some nights, on the road, you still hear your own build coming.`
    : rested?`Every soldier you lost, you laid to rest. Your graveyard is quiet, and it stays quiet. That is the rarest victory this land allows.`
    :'You lost almost no one — or you never let anyone matter enough to lose. History will not know the difference.';
  return header()+`<div id="main"><div class="col" style="flex:1">
    <h1 style="color:#c9a227">The Argument Ends.</h1>
    <p>Week ${S.week}. Renown ${S.renown}. Magister Vell is dead, and the hand that fed the Blight is off the board.</p>
    <h2>The Throne</h2><p>${heirLine}</p>
    <h2>The Company You Became</h2><p>${identity}</p>
    <h2>The Reckoning</h2><p class="bond">${reck}</p>
    <h2>Chronicle</h2>
    ${S.chronicle.slice(-8).map(c=>`<p class="bg">${esc(c)}</p>`).join('')||'<p class="hint">A short, bloody story.</p>'}
    <p style="margin-top:14px;font-style:italic">The Blight is not ended. It never ends. But for one season, on one banner, you fought everyone you failed to protect — and you were still standing when the smoke cleared.</p>
    <p class="hint">— GRAVEBORNE, Act III. Thank you for playing the alpha. —</p>
    <button class="primary" onclick="NEWGAME()">Raise a new banner</button>
  </div></div>`;
}

/* ============================== BOOT ============================== */
window.G={ get state(){return S;}, newGame, advanceDays, weeklyTick, startBattle, save, load,
  soldierById, rise, graves:()=>S.graves, dbgKill:(id)=>{const s=soldierById(id); if(s){S.battle=null; killSoldier(s); S.graves[S.graves.length-1].state='lost'; render();}} };
if(!load()) newGame();
else {
  log('The record resumes.','wk');
  // self-heal interrupted choices: rites and feat picks owed from before a reload
  for(const g of S.graves){ if(g.state==='recovered') queueModal(()=>ritesModal(g)); }
  for(const s of S.roster){ (s.pendingFeats||[]).forEach(p=>queueModal(()=>featModal(s,p.opts.filter(f=>!s.feats.includes(f)),p.stat))); }
  render(); pumpModals();
}
</script>
</body>
</html>
